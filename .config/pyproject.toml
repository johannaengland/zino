[tool.isort]
profile = "black"

[tool.black]
line-length = 120
exclude = '''
/(
    \.eggs         # exclude a few common directories in the
  | \.git          # root of the project
  | \.hg
  | \.mypy_cache
  | \.nox
  | \.tox
  | \.venv
  | \.ve
  | _build
  | buck-out
  | build
  | dist
  | src/zino/mibdumps
)
'''
